name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: structural validation, lint, and index freshness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Structural validation
        run: python tools/validate.py

      - name: Graph health lint
        run: python tools/lint.py

      - name: INDEX.yaml is fresh
        run: python tools/build_index.py --check
