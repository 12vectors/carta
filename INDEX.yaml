    - Payload size and volatility
    - Source-of-truth location (single authoritative store vs. local views)
    - Audit and replay requirements
    - Eventual-consistency tolerance
  dtree-choose-messaging-style:
    id: dtree-choose-messaging-style
    type: decision-tree
    level: foundation
    path: foundations/25-decision-trees/dtree-choose-messaging-style.md
    maturity: stable
    decides_between:
    - pattern-rest-api
    - pattern-grpc-api
    - pattern-publish-subscribe
