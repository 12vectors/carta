  dtree-choose-api-style:
    id: dtree-choose-api-style
    type: decision-tree
    level: foundation
    path: foundations/25-decision-trees/dtree-choose-api-style.md
    maturity: stable
    decides_between:
    - pattern-rest-api
    - pattern-graphql-api
    - pattern-grpc-api
    related_patterns:
    - pattern-api-gateway
    - pattern-backend-for-frontend
    criteria:
    - Consumer class (public third-party, first-party web/mobile, internal service-to-service)
    - Query flexibility (fixed contract vs. caller-picked fields)
    - Schema enforcement (strict typed vs. loose JSON)
    - Latency profile
    - Tooling and ecosystem available to consumers
  dtree-choose-background-work:
    id: dtree-choose-background-work
    type: decision-tree
    level: foundation
    path: foundations/25-decision-trees/dtree-choose-background-work.md
    maturity: stable
    decides_between:
    - pattern-async-request-reply
    - pattern-queue-based-load-leveling
    - pattern-competing-consumers
    related_patterns:
    - pattern-saga
    - pattern-orchestrator-workers
    - pattern-idempotency-key
    criteria:
    - Durability — must the task survive process crash, deploy, or host loss?
    - Volume — events per minute vs. events per second vs. events per millisecond?
    - Delay semantics — immediate, scheduled, periodic, or long-running (minutes to days)?
    - Retry and delivery guarantees — at-most-once / at-least-once / exactly-once with compensation?
    - Operational complexity budget — can the team run a broker, a workflow engine, or only a process?
    - Caller visibility — does the caller need a status or result handle after accepting the request?
  dtree-choose-data-access:
    id: dtree-choose-data-access
    type: decision-tree
    level: foundation
    path: foundations/25-decision-trees/dtree-choose-data-access.md
    maturity: stable
    decides_between:
    - pattern-cache-aside
    - pattern-read-replica
    - pattern-materialized-view
    - pattern-cqrs
    related_patterns:
    - pattern-sharding
    - pattern-event-sourcing
    criteria:
    - Query shape (point reads vs. range scans vs. aggregations)
    - Read/write ratio
    - Staleness tolerance
    - Write path under control (or read-path-only change)
    - Consistency mode (strong vs. read-your-writes vs. eventual)
  dtree-choose-event-style:
    id: dtree-choose-event-style
    type: decision-tree
    level: foundation
    path: foundations/25-decision-trees/dtree-choose-event-style.md
    maturity: stable
    decides_between:
