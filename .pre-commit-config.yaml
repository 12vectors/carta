# Optional: configuration for the pre-commit framework (pre-commit.com).
# Install once per machine:   pip install pre-commit
# Activate in this repo:       pre-commit install
#
# If you don't use the pre-commit framework, run tools/hooks/install.sh
# instead — it installs the same hook as a plain git symlink with no
# additional dependency.

repos:
  - repo: local
    hooks:
      - id: carta-build-index
        name: Regenerate INDEX.yaml on content changes
        entry: bash -c 'python3 tools/build_index.py && git add INDEX.yaml'
        language: system
        files: ^(foundations|org|teams|projects)/.*\.md$
        pass_filenames: false
